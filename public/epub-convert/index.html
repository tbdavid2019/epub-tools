<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>EPUB 簡轉繁 — 免費線上 EPUB 簡體轉繁體工具｜HelloRuru</title>
  <meta name="description" content="免費線上 EPUB 簡體轉繁體工具，使用 OpenCC（繁化姬）引擎做詞彙級轉換，保留原書格式與排版。全程瀏覽器本機處理，不上傳檔案。">
  <meta name="keywords" content="EPUB簡轉繁,簡體轉繁體,電子書轉換,OpenCC,繁化姬,免費轉換,本機處理">
  <meta name="author" content="Hello Ruru">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://tools.helloruru.com/epub-convert/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="EPUB 簡轉繁 — 免費線上 EPUB 簡體轉繁體工具｜HelloRuru">
  <meta property="og:description" content="免費線上 EPUB 簡體轉繁體工具，使用 OpenCC 引擎做詞彙級轉換，保留原書格式與排版。全程本機處理。">
  <meta property="og:url" content="https://tools.helloruru.com/epub-convert/">
  <meta property="og:site_name" content="Hello Ruru Tools">
  <meta property="og:locale" content="zh_TW">
  <meta property="og:image" content="https://tools.helloruru.com/og-image.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="EPUB 簡轉繁 — 免費線上 EPUB 簡體轉繁體工具｜HelloRuru">
  <meta name="twitter:description" content="免費線上 EPUB 簡體轉繁體工具，使用 OpenCC 引擎做詞彙級轉換，保留原書格式與排版。全程本機處理。">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <!-- Brand Header -->
  <script src="https://lab.helloruru.com/shared/brand-header.js"></script>

  <!-- Dark Mode Init -->
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrapper">
    <div class="container">
      <!-- Brand Header -->
      <hello-ruru-header title="EPUB 簡轉繁"></hello-ruru-header>

      <!-- Theme Toggle -->
      <div class="theme-toggle-wrap">
        <button class="theme-toggle" id="themeToggle" aria-label="切換深色模式">
          <svg id="iconSun" class="icon-sun" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg id="iconMoon" class="icon-moon" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="currentColor">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>

      <!-- Back Link -->
      <a href="/" class="back-link">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="currentColor">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回工具箱
      </a>

      <!-- Instructions Card -->
      <div class="card instruction-card">
        <h2 class="card-title">
          <span class="icon-circle lavender">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="currentColor">
              <path d="M12 3v18"/><path d="M5 8l7-5 7 5"/><path d="M8 14l4 4 4-4"/><circle cx="5" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
            </svg>
          </span>
          使用說明
        </h2>
        <ul class="instruction-list">
          <li>上傳簡體中文的 EPUB 電子書，自動轉換為繁體中文</li>
          <li>使用 OpenCC 繁化姬引擎，包含詞彙轉換（如「軟件」→「軟體」）</li>
          <li>全程本機處理，檔案不會上傳到伺服器</li>
          <li>無檔案大小限制</li>
        </ul>
      </div>

      <!-- Main Card -->
      <div class="card main-card">
        <!-- Upload State -->
        <div id="stateUpload">
          <div class="upload-header">
            <h2>上傳 EPUB 檔案</h2>
            <p class="privacy-note">
              <svg viewBox="0 0 24 24" width="14" height="14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="currentColor">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
              檔案不會上傳到伺服器，全程在你的瀏覽器處理
            </p>
          </div>
          <label id="dropZone" class="drop-zone">
            <input type="file" id="fileInput" accept=".epub" hidden>
            <svg viewBox="0 0 24 24" width="48" height="48" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="currentColor" class="upload-icon">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <p class="drop-text">拖放 EPUB 到這裡</p>
            <p class="drop-hint">或點擊選擇檔案</p>
          </label>
        </div>

        <!-- Confirm State -->
        <div id="stateConfirm" class="hidden">
          <div class="confirm-header">
            <h2>確認轉換</h2>
          </div>
          <div class="file-info">
            <svg viewBox="0 0 24 24" width="32" height="32" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="currentColor" class="file-icon">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            <div class="file-details">
              <p id="fileName" class="file-name"></p>
              <p id="fileSize" class="file-size"></p>
            </div>
            <button id="btnRemoveFile" class="btn-remove" aria-label="移除檔案">
              <svg viewBox="0 0 24 24" width="16" height="16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="currentColor">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>

          <!-- Progress -->
          <div id="progressWrap" class="hidden">
            <div class="progress-bar">
              <div id="progressFill" class="progress-fill"></div>
            </div>
            <p id="progressText" class="progress-text"></p>
          </div>

          <!-- Punctuation Toggle -->
          <div class="toggle-row" style="margin:16px 0">
            <div class="toggle-label">
              <div class="toggle-title">台灣標點符號</div>
              <div class="toggle-desc">"" → 「」、'' → 『』，半形標點轉全形</div>
            </div>
            <button class="toggle-switch on" id="togglePunctuation">
              <span class="toggle-knob"></span>
            </button>
          </div>

          <!-- Buttons -->
          <div class="action-buttons">
            <button id="btnCancel" class="btn btn-secondary">取消</button>
            <button id="btnConvert" class="btn btn-primary">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="currentColor">
                <path d="M12 3v18"/><path d="M5 8l7-5 7 5"/><path d="M8 14l4 4 4-4"/><circle cx="5" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
              </svg>
              開始轉換
            </button>
          </div>
        </div>

        <!-- Complete State -->
        <div id="stateComplete" class="hidden">
          <div class="complete-content">
            <svg viewBox="0 0 24 24" width="64" height="64" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="currentColor" class="complete-icon">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <h2>轉換完成！</h2>
            <p class="complete-subtitle">檔案已自動下載</p>
            <p id="completeStats" class="complete-stats"></p>
            <button id="btnReset" class="btn btn-primary">轉換另一個檔案</button>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <footer class="site-footer">
        <p>&copy; <span id="footer-year"></span> Kaoru Tsai. All Rights Reserved. | Contact: <a href="mailto:hello@helloruru.com">hello@helloruru.com</a></p>
      </footer>
    </div>
  </div>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>

  <!-- App -->
  <script src="js/main.js"></script>
</body>
</html>
