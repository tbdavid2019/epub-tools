<body>
  <!-- Brand Header -->
  <script src="https://lab.helloruru.com/shared/brand-header.js"></script>
  <hello-ruru-header title="圖書館新書探測器"></hello-ruru-header>

  <main class="main">
    <!-- Hero -->
    <div class="hero">
      <div class="accent-bar"></div>
      <h1>圖書館新書探測器</h1>
      <p>想看的書，先查圖書館有沒有</p>
    </div>

    <!-- Tab 切換 -->
    <nav class="tab-nav" id="tab-nav">
      <button class="tab active" data-tab="new">
        <i data-lucide="book-plus" width="16" height="16"></i> 新書上架
      </button>
      <button class="tab" data-tab="top">
        <i data-lucide="flame" width="16" height="16"></i> 熱門排行
      </button>
      <button class="tab" data-tab="free-hits">
        <i data-lucide="sparkles" width="16" height="16"></i> 免費撿熱書
      </button>
    </nav>

    <!-- 搜尋（永遠顯示） -->
    <div class="search-panel" id="search-panel">
      <div class="search-row">
        <input type="text" id="search-input" class="input" placeholder="輸入書名，例如：原子習慣">
        <button class="btn btn-primary" id="btn-search">
          <i data-lucide="search" width="16" height="16"></i> 搜尋全部圖書館
        </button>
      </div>
      <p class="form-note">同時搜尋 23 間公共圖書館的 HyRead 電子書館藏</p>
    </div>

    <!-- 圖書館選擇器 -->
    <div class="lib-selector" id="lib-selector">
      <label for="select-lib">選擇圖書館</label>
      <select id="select-lib" class="select"></select>
    </div>

    <!-- 排序列 -->
    <div class="sort-row" id="sort-row">
      <span class="result-count" id="result-count"></span>
      <button class="btn btn-sm btn-outline" id="btn-sort">
        <i data-lucide="arrow-up-down" width="14" height="14"></i> 按書名
      </button>
    </div>

    <!-- 載入中 -->
    <div class="loading" id="loading" style="display:none">
      <div class="spinner"></div>
      <span id="loading-text">載入中...</span>
    </div>

    <!-- 結果區 -->
    <div id="results"></div>

    <!-- 空狀態 -->
    <div class="empty" id="empty-state">
      <p>選一間圖書館，看看最近上了什麼新書。</p>
    </div>

    <!-- 致敬 -->
    <section class="section credits-section">
      <div class="divider-gold"></div>
      <p class="credits">
        資料來源：<a href="https://ebook.hyread.com.tw/" target="_blank" rel="noopener">HyRead ebook</a>

        <a href="https://github.com/YuanLiou/TaiwanEbookSearch" target="_blank" rel="noopener">TaiwanEbookSearch</a>（MIT）
