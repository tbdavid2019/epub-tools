*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F3EB;--card:#FFFDF8;--title:#3D2B1F;--body:#4A4A4A;--muted:#888;
  --ink:#5C4033;--ink-light:#8B7355;--border:#E8E0D4;--gold:#C5A55A;--gold-light:#E8D5A0;
  --rose:#D4A5A5;--lavender:#B8A9C9;
}
body{font-family:'GenSenRounded','Noto Sans TC',sans-serif;font-weight:500;background:var(--bg);color:var(--body);line-height:1.8;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(212,165,165,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(184,169,201,.06) 0%,transparent 50%);pointer-events:none;z-index:0}

/* 古風邊框 */
.page-border{position:fixed;inset:8px;border:1px solid var(--border);pointer-events:none;z-index:100;border-radius:8px}
.page-border::before,.page-border::after{content:'';position:absolute;width:24px;height:24px;border-color:var(--gold);border-style:solid}
.page-border::before{top:-1px;left:-1px;border-width:2px 0 0 2px;border-radius:8px 0 0 0}
.page-border::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;border-radius:0 0 8px 0}
.page-border .corner-tr,.page-border .corner-bl{position:absolute;width:24px;height:24px;border-color:var(--gold);border-style:solid}
.page-border .corner-tr{top:-1px;right:-1px;border-width:2px 2px 0 0;border-radius:0 8px 0 0}
.page-border .corner-bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px;border-radius:0 0 0 8px}

/* Header */
.site-header{text-align:center;padding:48px 24px 24px;position:relative;z-index:1}
.site-header h1{font-family:'Noto Serif TC',serif;font-size:36px;font-weight:700;color:var(--title);letter-spacing:6px;margin-bottom:4px}
.site-header h1{transition:.2s}
.site-header h1:hover{color:var(--gold)}
.site-header .sub{font-size:14px;color:var(--ink-light);letter-spacing:4px}
.deco{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:12px}
.deco .ln{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.deco .dt{width:6px;height:6px;background:var(--gold);border-radius:50%}
.header-ornament{display:flex;justify-content:center;margin-bottom:-8px}
.header-ornament.bottom{margin-top:-4px;margin-bottom:0}

/* 模式切換 */
.mode-bar{display:flex;justify-content:center;gap:0;margin:16px auto 24px;max-width:280px;background:var(--card);border-radius:24px;padding:4px;border:1px solid var(--border);position:relative;z-index:1}
.mode-bar button{flex:1;padding:8px 12px;border:none;background:transparent;font-family:inherit;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;border-radius:20px;transition:.3s}
.mode-bar button.on{background:var(--ink);color:#FFFDF8}

/* 歌曲列表 */
.list{max-width:820px;margin:0 auto;padding:0 24px 32px;position:relative;z-index:1}
.list h2{font-family:'Noto Serif TC',serif;font-size:20px;color:var(--title);text-align:center;margin-bottom:20px;letter-spacing:2px}
.filters{display:flex;justify-content:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.fbtn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--body);cursor:pointer;font-size:14px;font-family:inherit;transition:.2s}
.fbtn:hover{border-color:var(--gold-light);color:var(--gold)}
.fbtn.on{background:var(--gold);border-color:var(--gold);color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;transition:.3s;overflow:hidden}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08);border-color:var(--gold-light)}
.card .t{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;color:var(--title);margin-bottom:2px}
.card .a{font-size:13px;color:var(--ink-light)}
.card .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:8px;background:var(--gold-light);color:var(--ink);margin-top:8px}
.card .tag.warn{background:#F5D0C5}

/* 譜面 */
.score-view{display:none;max-width:720px;margin:0 auto;padding:0 24px 48px;position:relative;z-index:1}
.score-view.on{display:block}
.score-head{text-align:center;margin-bottom:24px}
.back{display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:14px;color:var(--ink-light);background:none;border:none;cursor:pointer;margin-bottom:12px;padding:8px 16px;border-radius:20px;transition:.2s}
.back:hover{background:rgba(0,0,0,.04)}
.score-head h2{font-family:'Noto Serif TC',serif;font-size:28px;font-weight:700;color:var(--title);cursor:pointer;transition:.2s}
.score-head h2:hover{color:var(--gold)}
.score-head .info{font-size:14px;color:var(--ink-light);margin-top:2px}

/* 控制列 */
.ctrl{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:20px;padding:10px 16px;background:var(--card);border-radius:24px;border:1px solid var(--border);position:sticky;top:12px;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,0.06);flex-wrap:wrap}
.play-btn{width:44px;height:44px;border-radius:50%;border:2px solid var(--ink);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.play-btn:hover{background:var(--ink)}
.play-btn:hover svg{stroke:#fff}
.play-btn svg{width:20px;height:20px}
.stop-btn{width:44px;height:44px;border-radius:50%;border:2px solid #C97070;background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.stop-btn:hover{background:#C97070}
.stop-btn:hover svg{stroke:#fff}
.stop-btn svg{width:20px;height:20px;stroke:#C97070}
.metro-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--ink-light);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0;color:var(--ink-light)}
.metro-btn:hover{border-color:var(--ink);color:var(--ink)}
.metro-btn.on{background:var(--gold);border-color:var(--gold);color:#fff}
.beat-dot{width:10px;height:10px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .05s}
.beat-dot.flash{background:var(--gold)}
.metro-vol{width:50px;accent-color:var(--gold)}
.loop-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--ink-light);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0;color:var(--ink-light)}
.loop-btn:hover{border-color:var(--ink);color:var(--ink)}
.loop-btn.on{background:var(--rose);border-color:var(--rose);color:#fff}
.loop-btn.picking{background:var(--gold);border-color:var(--gold);color:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.nc.loop-start,.nc.loop-end{box-shadow:0 0 0 2px var(--rose)}
.nc.in-loop{background:rgba(212,165,165,.15)}
.spd{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.spd input{width:80px;accent-color:var(--ink)}
.spd b{color:var(--ink);min-width:28px}

/* 圖例 */
.legend{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:20px}
.legend i{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);font-style:normal}
.legend i span{width:14px;height:14px;border-radius:50%;display:inline-block}

/* 簡譜主體（橫排） */
.sheet{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 20px;margin-bottom:24px}
.sheet-row{display:flex;flex-wrap:wrap;align-items:flex-start;margin-bottom:4px;gap:2px}
.lyrics-row{display:flex;flex-wrap:wrap;align-items:flex-start;margin-bottom:14px;gap:2px;min-height:18px;font-family:'GenSenRounded','Noto Sans TC','Noto Sans JP',sans-serif;font-weight:400;font-size:13px;color:var(--ink-light)}
.lyric-m{font-size:13px;color:var(--ink-light);padding:0 2px;white-space:nowrap}
.lyric-m .bl{width:1px;margin:0 6px}
.measure{display:inline-flex;align-items:flex-start;gap:2px;padding:4px 0;break-inside:avoid}
.barline{width:1px;height:52px;background:var(--ink-light);margin:0 6px;flex-shrink:0;opacity:.4;align-self:center}

/* 單個音符格 */
.nc{display:inline-flex;flex-direction:column;align-items:center;min-width:32px;padding:2px 4px;cursor:pointer;border-radius:8px;transition:background .15s}
.nc:hover{background:rgba(197,165,90,.12)}
.nc.playing{background:rgba(197,165,90,.2);box-shadow:0 0 0 2px var(--gold)}
.nc .dot{height:10px;font-size:18px;line-height:10px;color:transparent;user-select:none}
.nc .dot.on{color:inherit}
.nc .num{font-size:24px;font-weight:700;line-height:1.2;transition:transform .1s}
.nc.playing .num{transform:scale(1.15)}
.nc .num.dash{color:var(--muted);font-size:20px}
.nc .num.rest{color:var(--border);font-size:16px}
.nc .num.out{opacity:.4;text-decoration:line-through}

/* 八音鼓參考 */
.drum-sec{text-align:center;margin-top:32px}
.drum-sec h3{font-family:'Noto Serif TC',serif;font-size:16px;color:var(--title);margin-bottom:12px;letter-spacing:2px}

/* Footer */
footer{text-align:center;padding:32px 24px;font-size:14px;color:var(--muted);position:relative;z-index:1}
footer a{color:var(--rose);text-decoration:none}

/* 提示 */
.tip{text-align:center;font-size:13px;color:var(--muted);margin-bottom:16px;padding:8px 16px;background:rgba(197,165,90,.08);border-radius:12px}

@media(max-width:767px){
  .site-header h1{font-size:26px;letter-spacing:3px}
  .grid{grid-template-columns:1fr 1fr}
  .score-head h2{font-size:22px}
  .nc{min-width:26px;padding:2px 2px}
  .nc .num{font-size:20px}
  .nc .dot{font-size:14px}
  .page-border{inset:4px}
  .sheet{padding:16px 12px}
}
@media(max-width:400px){
  .grid{grid-template-columns:1fr}
  .nc{min-width:22px}
  .nc .num{font-size:18px}
}
</style>
</head>

/* ===== 解析譜面 ===== */
function parse(str){
  return str.split(/\s+/).map(t=>{
    if(t==='|') return {type:'bar'};
    if(t==='-') return {type:'dash'};
    if(t==='0') return {type:'rest'};
    return {type:'note',n:t};
  });
}

/* ===== 初始化 ===== */
function init(){
  renderFilters();
  renderGrid();
  renderLegend();
  renderDrum();
  const sy=2026,cy=new Date().getFullYear();
  $('fy').textContent=cy>sy?sy+'\u2013'+cy:sy;
}

/* ===== 歌曲列表 ===== */
let curFilter='全部';
function renderFilters(){
  const cats=['全部',...new Set(SONGS.map(s=>s.tag))];
  $('filters').innerHTML=cats.map(c=>{
    const cnt=c==='全部'?SONGS.length:SONGS.filter(s=>s.tag===c).length;
    return `<button class="fbtn${c===curFilter?' on':''}" onclick="setFilter('${c}')">${c} (${cnt})</button>`;
  }).join('');
}
function setFilter(f){curFilter=f;renderFilters();renderGrid();}
function renderGrid(){
  const list=curFilter==='全部'?SONGS:SONGS.filter(s=>s.tag===curFilter);
  $('grid').innerHTML=list.map(s=>{
    const rng=mode===8?R8:R15;
    const tokens=parse(s.score);
    const hasOut=tokens.some(t=>t.type==='note'&&!rng.includes(t.n));
    return `<div class="card" onclick="openSong('${s.id}')">
      <div class="t">${s.title}</div>
      <div class="a">${s.artist}${s.year?' ('+s.year+')':''}</div>
      <span class="tag${hasOut?' warn':''}">${hasOut?'有改編':'原調適合'}</span>
    </div>`;
  }).join('');
}

/* ===== 開啟/關閉譜面 ===== */
function openSong(id){
  curSong=SONGS.find(s=>s.id===id);
  if(!curSong) return;
  stopPlay();
  $('listSec').style.display='none';
  $('scoreSec').classList.add('on');
  $('sTitle').textContent=curSong.title;
  $('sInfo').textContent=curSong.artist+(curSong.year?' ('+curSong.year+')':'');
  $('bpmR').value=curSong.bpm;
  $('bpmV').textContent=curSong.bpm;
  renderSheet(curSong);
  renderLegend();
  renderDrum();
  window.scrollTo({top:0,behavior:'smooth'});
}

function goBack(){
  stopPlay();stopMetro();clearLoop();curSong=null;
  $('listSec').style.display='';
  $('scoreSec').classList.remove('on');
}

/* ===== 渲染橫排簡譜 ===== */
function renderSheet(song){
  const el=$('sheet');
  el.innerHTML='';
  const tokens=parse(song.score);
  const rng=mode===8?R8:R15;
  const sub=mode===8?SUB8:{};

  let row=document.createElement('div');
  row.className='sheet-row';
  let measure=document.createElement('span');
  measure.className='measure';
  let noteIdx=0;

  tokens.forEach(tk=>{
    if(tk.type==='bar'){
      row.appendChild(measure);
      const bl=document.createElement('span');
      bl.className='barline';
      row.appendChild(bl);
      measure=document.createElement('span');
      measure.className='measure';
      return;
    }

    const cell=document.createElement('span');
    cell.className='nc';
    cell.dataset.i=noteIdx++;

    if(tk.type==='dash'){
      cell.innerHTML='<span class="dot">&middot;</span><span class="num dash">&mdash;</span>';
      cell.onclick=()=>{};
    } else if(tk.type==='rest'){
      cell.innerHTML='<span class="dot">&middot;</span><span class="num rest">0</span>';
      cell.onclick=()=>{};
    } else {
      let note=tk.n;
      let out=false;
      if(!rng.includes(note)){
        out=true;
        note=sub[note]||note;
      }
      const meta=N[note]||N['1'];
      const hi=note.includes("'")&&!note.includes("''");
      const hi2=note.includes("''");
      const base=note.replace(/'/g,'');
      const dotVis=hi||hi2;

      cell.innerHTML=`<span class="dot${dotVis?' on':''}"${dotVis?' style="color:'+meta.c+'"':''}>${hi2?'::':'&middot;'}</span><span class="num${out?' out':''}" style="color:${meta.c}">${base}</span>`;
      cell.onclick=()=>{if(loopPicking){pickLoopPoint(cell);return;}playNote(note);};
      cell.dataset.note=note;
    }
    measure.appendChild(cell);
  });

  row.appendChild(measure);
  el.appendChild(row);

  /* 每 4 小節（每 4 個 barline 後）換行 */
  reflow();
}

function reflow(){
  const sheet=$('sheet');
  const items=[...sheet.querySelector('.sheet-row').children];
  sheet.innerHTML='';

  /* 歌詞：用 | 分隔，每段對應一行（4 小節） */
  const lArr=curSong&&curSong.lyrics?curSong.lyrics.split('|').map(s=>s.trim()):[];
  let rowIdx=0;

  /* 把 measures 和 barlines 分組，每 4 小節一行 */
  let row=document.createElement('div');
  row.className='sheet-row';
  let mCount=0;

  items.forEach((item,i)=>{
    row.appendChild(item);
    if(item.classList.contains('measure')) mCount++;
    if(item.classList.contains('barline')&&mCount>=4){
      sheet.appendChild(row);
      if(lArr.length&&lArr[rowIdx]){
        const lr=document.createElement('div');
        lr.className='lyrics-row';
        lr.textContent=lArr[rowIdx];
        sheet.appendChild(lr);
      }
      rowIdx++;
      row=document.createElement('div');
      row.className='sheet-row';
      mCount=0;
    }
  });
  if(row.children.length){
    sheet.appendChild(row);
    if(lArr.length&&lArr[rowIdx]){
      const lr=document.createElement('div');
      lr.className='lyrics-row';
      lr.textContent=lArr[rowIdx];
      sheet.appendChild(lr);
    }
  }
}

/* ===== 圖例 ===== */
function renderLegend(){
  const notes=mode===8?R8:R15;
  $('legend').innerHTML=notes.map(n=>{
    const m=N[n];
    return `<i><span style="background:${m.c}"></span>${n} ${m.l}</i>`;
  }).join('');
}

/* ===== 鼓圖 ===== */
function renderDrum(){
  const notes=mode===8?R8:R15;
  const sz=260,cx=sz/2,cy=sz/2;
  /* KONIX 8 音鼓實際排列 */
  const POS8={'1':[cx,220],'4':[cx,40],'2':[40,cy],'3':[220,cy],
    "1'":[60,65],'7':[200,65],'6':[60,195],'5':[200,195]};
  let g='';
  notes.forEach((n,i)=>{
    let x,y;
    if(mode===8&&POS8[n]){[x,y]=POS8[n];}
    else{const a=(i/notes.length)*Math.PI*2-Math.PI/2;x=cx+95*Math.cos(a);y=cy+95*Math.sin(a);}
    const m=N[n],base=n.replace(/'/g,''),hi=n.includes("'");
    g+=`<g onclick="playNote('${n}')" style="cursor:pointer">
      <circle cx="${x}" cy="${y}" r="20" fill="${m.c}" stroke="#fff" stroke-width="2"/>
      <text x="${x}" y="${y+1}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="13" font-weight="700">${base}</text>
      ${hi?`<circle cx="${x}" cy="${y-11}" r="2" fill="#fff"/>`:''}
    </g>`;
  });
  $('drumSvg').innerHTML=`<svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}">
    <circle cx="${cx}" cy="${cy}" r="118" fill="none" stroke="var(--border)" stroke-width="1.5"/>
    <circle cx="${cx}" cy="${cy}" r="18" fill="var(--border)" opacity=".4"/>
    ${g}</svg>`;
}

/* ===== Web Audio ===== */
function getCtx(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;}

function playNote(n){
  const m=N[n];if(!m)return;
  const c=getCtx(),now=c.currentTime;
  /* 輕殘響（空靈鼓共鳴腔，不過重） */
  const rev=c.createConvolver();
  const len=c.sampleRate*1.2,buf=c.createBuffer(2,len,c.sampleRate);
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,4);}
  rev.buffer=buf;
  const wet=c.createGain();wet.gain.value=.10;
  const dry=c.createGain();dry.gain.value=.85;
  rev.connect(wet);wet.connect(c.destination);dry.connect(c.destination);
  /* 基音：清脆正弦波，短促起音 + 快速衰減（空靈鼓的叮聲） */
  const o=c.createOscillator(),g=c.createGain();
  o.type='sine';o.frequency.setValueAtTime(m.f,now);
  g.gain.setValueAtTime(0,now);
  g.gain.linearRampToValueAtTime(.38,now+.008);
  g.gain.setValueAtTime(.30,now+.03);
  g.gain.exponentialRampToValueAtTime(.001,now+1.4);
  o.connect(g);g.connect(dry);g.connect(rev);o.start(now);o.stop(now+1.5);
  /* 八度泛音（輕微，增加金屬感） */
  const o2=c.createOscillator(),g2=c.createGain();
  o2.type='sine';o2.frequency.setValueAtTime(m.f*2,now);
  g2.gain.setValueAtTime(0,now);
  g2.gain.linearRampToValueAtTime(.06,now+.005);
  g2.gain.exponentialRampToValueAtTime(.001,now+.8);
  o2.connect(g2);g2.connect(dry);g2.connect(rev);o2.start(now);o2.stop(now+.9);
  /* 微弱五度泛音（鼓腔共鳴） */
  const o3=c.createOscillator(),g3=c.createGain();
  o3.type='sine';o3.frequency.setValueAtTime(m.f*3.01,now);
  g3.gain.setValueAtTime(0,now);
  g3.gain.linearRampToValueAtTime(.012,now+.005);
  g3.gain.exponentialRampToValueAtTime(.001,now+.5);
  o3.connect(g3);g3.connect(dry);g3.connect(rev);o3.start(now);o3.stop(now+.6);
  /* 擊打瞬態：手指碰金屬舌片的「叮」 */
  const nb=c.createBufferSource();
  const nbl=c.sampleRate*.02,nbuf=c.createBuffer(1,nbl,c.sampleRate);
  const nd=nbuf.getChannelData(0);for(let i=0;i<nbl;i++)nd[i]=(Math.random()*2-1)*(1-i/nbl);
  nb.buffer=nbuf;
  const nf=c.createBiquadFilter();nf.type='bandpass';nf.frequency.value=m.f*5;nf.Q.value=3;
  const ng=c.createGain();ng.gain.setValueAtTime(.08,now);ng.gain.exponentialRampToValueAtTime(.001,now+.03);
  nb.connect(nf);nf.connect(ng);ng.connect(dry);nb.start(now);
}

/* ===== 節拍器 ===== */
let metroOn=false, metroTimer=null, beatCount=0;

function metroClick(){
  if(!ctx) ctx=new(window.AudioContext||window.webkitAudioContext)();
  const c=ctx, now=c.currentTime;
  const o=c.createOscillator(), g=c.createGain();
  /* 第 1 拍高音，其餘低音 */
  o.frequency.value=(beatCount%4===0)?1200:800;
  o.type='sine';
  const vol=(parseInt($('metroVol').value)||50)/100;
  g.gain.setValueAtTime(.35*vol,now);
  g.gain.exponentialRampToValueAtTime(.001,now+.06);
  o.connect(g);g.connect(c.destination);
  o.start(now);o.stop(now+.07);
  /* 閃爍 */
  const dot=$('beatDot');
  dot.classList.add('flash');
  setTimeout(()=>dot.classList.remove('flash'),100);
  beatCount++;
}

function startMetro(){
  metroOn=true;beatCount=0;
  $('metroBtn').classList.add('on');
  metroClick();
  scheduleMetro();
}

function scheduleMetro(){
  if(!metroOn)return;
  const bpm=parseInt($('bpmR').value)||70;
  metroTimer=setTimeout(()=>{
    metroClick();
    scheduleMetro();
  },60000/bpm);
}

function stopMetro(){
  metroOn=false;beatCount=0;
  $('metroBtn').classList.remove('on');
  if(metroTimer)clearTimeout(metroTimer);
  $('beatDot').classList.remove('flash');
}

function toggleMetro(){metroOn?stopMetro():startMetro()}

/* ===== 分段循環 Loop ===== */
let loopPicking=false, loopStart=-1, loopEnd=-1;

function toggleLoopMode(){
  if(loopStart>=0&&loopEnd>=0&&!loopPicking){
    /* 已有 loop → 清除 */
    clearLoop();return;
  }
  if(loopPicking){
    /* 正在選 → 取消 */
    loopPicking=false;
    $('loopBtn').classList.remove('picking');
    $('tipBox').textContent='點擊任何數字可以試聽音色，按播放可自動演奏';
    return;
  }
  /* 進入選取模式 */
  loopPicking=true;loopStart=-1;loopEnd=-1;
  clearLoopHighlight();
  $('loopBtn').classList.add('picking');
  $('tipBox').textContent='點第一個音設起點，再點第二個音設終點';
}

function pickLoopPoint(cell){
  const cells=[...document.querySelectorAll('.nc')];
  const i=cells.indexOf(cell);
  if(i<0)return;

  if(loopStart<0){
    loopStart=i;
    cell.classList.add('loop-start');
    $('tipBox').textContent='起點已設定，再點一個音設終點';
    /* 試聽起點音 */
    if(cell.dataset.note)playNote(cell.dataset.note);
  } else {
    loopEnd=i;
    /* 確保 start < end */
    if(loopEnd<loopStart){const t=loopStart;loopStart=loopEnd;loopEnd=t;}
    loopPicking=false;
    $('loopBtn').classList.remove('picking');
    $('loopBtn').classList.add('on');
    highlightLoop();
    const count=loopEnd-loopStart+1;
    $('tipBox').textContent='循環範圍：'+count+' 個音｜按播放開始練習｜再按循環鈕清除';
    /* 試聽終點音 */
    if(cell.dataset.note)playNote(cell.dataset.note);
  }
}

function highlightLoop(){
  clearLoopHighlight();
  const cells=[...document.querySelectorAll('.nc')];
  for(let i=loopStart;i<=loopEnd;i++){
    cells[i].classList.add('in-loop');
    if(i===loopStart)cells[i].classList.add('loop-start');
    if(i===loopEnd)cells[i].classList.add('loop-end');
  }
}

function clearLoopHighlight(){
  document.querySelectorAll('.nc.in-loop,.nc.loop-start,.nc.loop-end').forEach(e=>{
    e.classList.remove('in-loop','loop-start','loop-end');
  });
}

function clearLoop(){
  loopStart=-1;loopEnd=-1;loopPicking=false;
  clearLoopHighlight();
  $('loopBtn').classList.remove('on','picking');
  $('tipBox').textContent='點擊任何數字可以試聽音色，按播放可自動演奏';
}

/* ===== 自動播放 ===== */
function togglePlay(){playing?stopPlay():startPlay()}

function startPlay(){
  playing=true;
  idx=(loopStart>=0)?loopStart:0;
  $('icPlay').style.display='none';
  $('icPause').style.display='';
  $('stopBtn').style.display='flex';
  tick();
}

function stopPlay(){
  playing=false;
  $('icPlay').style.display='';
  $('icPause').style.display='none';
  $('stopBtn').style.display='none';
  if(timer)clearTimeout(timer);
  document.querySelectorAll('.nc.playing').forEach(e=>e.classList.remove('playing'));
  idx=0;
}

function tick(){
  if(!playing||!curSong)return;
  const cells=[...document.querySelectorAll('.nc')];
  const end=(loopEnd>=0)?loopEnd+1:cells.length;
  /* loop 回頭或結束 */
  if(idx>=end){
    if(loopStart>=0&&loopEnd>=0){idx=loopStart;}
    else{stopPlay();return;}
  }

  cells.forEach(c=>c.classList.remove('playing'));
  const cell=cells[idx];
  cell.classList.add('playing');
  cell.scrollIntoView({behavior:'smooth',block:'center'});

  const note=cell.dataset.note;
  if(note) playNote(note);

  const bpm=parseInt($('bpmR').value)||70;
  const ms=60000/bpm;
  idx++;
  timer=setTimeout(tick,ms);
}

/* ===== 模式切換 ===== */
function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-bar button').forEach(b=>{
    b.classList.toggle('on',parseInt(b.dataset.m)===m);
  });
  renderGrid();
  renderLegend();
  renderDrum();
  if(curSong) renderSheet(curSong);
}

init();
</script>
